services:
  # ============================================
  # Shared: Local PostgreSQL (dev only)
  # ============================================
  postgres:
    image: postgres:16-alpine
    profiles: ["dev"]
    env_file: .env.dev
    ports:
      - "${DEV_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus}
      POSTGRES_DB: ${POSTGRES_DB:-campus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Dev: install + shared build (init)
  # ============================================
  init-dev:
    image: node:22-alpine
    profiles: ["dev"]
    env_file: .env.dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --store-dir /tmp/pnpm-store && pnpm --filter @campus/shared build"
    volumes:
      - .:/app
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - root_node_modules:/app/node_modules

  # ============================================
  # Dev: source mount + hot reload
  # ============================================
  api-dev:
    image: node:22-alpine
    profiles: ["dev"]
    env_file: .env.dev
    working_dir: /app/apps/api
    command: sh -c "corepack enable && pnpm dev"
    ports:
      - "${DEV_API_PORT:-4100}:4100"
    volumes:
      - .:/app
      - api_node_modules:/app/apps/api/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - root_node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-campus}:${POSTGRES_PASSWORD:-campus}@postgres:5432/${POSTGRES_DB:-campus}
      NODE_ENV: development
      API_PORT: 4100
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      init-dev:
        condition: service_completed_successfully

  web-dev:
    image: node:22-alpine
    profiles: ["dev"]
    env_file: .env.dev
    working_dir: /app/apps/web
    command: sh -c "corepack enable && pnpm dev"
    ports:
      - "${DEV_WEB_PORT:-3200}:3200"
    volumes:
      - .:/app
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - root_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api-dev:4100
      NEXT_PUBLIC_WS_URL: http://localhost:${DEV_API_PORT:-4100}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /
    depends_on:
      api-dev:
        condition: service_started
      init-dev:
        condition: service_completed_successfully

  # ============================================
  # Prod: built images
  # ============================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["prod"]
    env_file: .env
    labels:
      logging: "true"
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL:-/}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL:-/}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    profiles: ["prod"]
    env_file: .env
    labels:
      logging: "true"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
  root_node_modules:
