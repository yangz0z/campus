server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker 컨테이너 로그 (web, api)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container

  # Webhook 로그
  - job_name: webhook
    static_configs:
      - targets: [localhost]
        labels:
          job: webhook
          __path__: /var/log/webhook.log

  # Cloudflare Tunnel 로그
  - job_name: cloudflared
    static_configs:
      - targets: [localhost]
        labels:
          job: cloudflared
          __path__: /var/log/cloudflared/*.log
